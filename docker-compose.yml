services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/18/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000" # S3 API endpoint
      - "9001:9001" # Web Console UI
    environment:
      - RUSTFS_ROOT_USER=${RUSTFS_ROOT_USER:-admin}
      - RUSTFS_ROOT_PASSWORD=${RUSTFS_ROOT_PASSWORD:-password}
      - RUSTFS_OBS_LOG_DIRECTORY=/logs
      - RUSTFS_VOLUMES=/data
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  nanomq:
    image: emqx/nanomq:latest
    ports:
      - "1883:1883"  # MQTT TCP Port
      - "8883:8883"  # MQTT SSL/TLS Port (if configured)
      - "8083:8083"  # MQTT WebSocket Port
      - "8081:8081"  # HTTP REST API Port / Web Management
    volumes:
      - nanomq-data:/opt/nanomq/data

  mqttx:
    image: emqx/mqttx-web:latest
    ports:
      - "${MQTTX_HOST_PORT:-9009}:80"
    depends_on:
      - nanomq

volumes:
  postgres-data:
  redis-data:
  nanomq-data:
  rustfs-data:
  rustfs-logs:
