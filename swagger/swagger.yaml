basePath: /
definitions:
  entity.CurrentStep:
    enum:
    - initial
    - completed
    type: string
    x-enum-varnames:
    - CurrentStepInitial
    - CurrentStepCompleted
  entity.UserStatus:
    enum:
    - active
    - inactive
    - banned
    type: string
    x-enum-varnames:
    - UserStatusActive
    - UserStatusInactive
    - UserStatusBanned
  request.CreateUserRequest:
    properties:
      avatar:
        example: 'avatar: coding'
        type: string
      email:
        example: rizalarfiyan@plant-factory.com
        maxLength: 255
        type: string
      name:
        example: Rizal Arfiyan
        maxLength: 64
        minLength: 3
        type: string
    required:
    - avatar
    - email
    - name
    type: object
  request.UpdateUserRequest:
    properties:
      avatar:
        example: 'avatar: coding'
        type: string
      name:
        example: Rizal Arfiyan
        maxLength: 64
        minLength: 3
        type: string
    required:
    - avatar
    - name
    type: object
  request.UserMeGettingStartedRequest:
    properties:
      avatar:
        example: avatar:coding
        type: string
      name:
        example: Rizal Arfiyan
        maxLength: 64
        minLength: 3
        type: string
    required:
    - avatar
    - name
    type: object
  response.AuthGoogleLoginResponse:
    properties:
      redirect_url:
        example: https://accounts.google.com/o/oauth2/auth/...
        type: string
    type: object
  response.AuthMeResponse:
    properties:
      avatar:
        example: https://plant-factory.com/avatar.jpg
        type: string
      current_step:
        allOf:
        - $ref: '#/definitions/entity.CurrentStep'
        example: completed
      email:
        example: rizalarfiyan@plant-factory.com
        type: string
      id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      name:
        example: Rizal Arfiyan
        type: string
      tenants:
        items:
          $ref: '#/definitions/response.AuthMeTenantResponse'
        type: array
    type: object
  response.AuthMeTenantResponse:
    properties:
      id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      logo:
        example: https://plant-factory.com/logo.jpg
        type: string
      name:
        example: Plant Factory
        type: string
      permissions:
        example:
        - '["read"'
        - ' "write"]'
        items:
          type: string
        type: array
      role:
        example: admin
        type: string
    type: object
  response.BasePaginationSwaggerResponse:
    properties:
      data: {}
      message:
        $ref: '#/definitions/response.MessageSwaggerResponse'
      pagination:
        $ref: '#/definitions/response.PaginationSwaggerResponse'
    type: object
  response.BaseSwaggerEmptyResponse:
    properties:
      data:
        example: "null"
        x-nullable: true
      message:
        $ref: '#/definitions/response.MessageSwaggerResponse'
    type: object
  response.BaseSwaggerResponse:
    properties:
      data: {}
      message:
        $ref: '#/definitions/response.MessageSwaggerResponse'
    type: object
  response.BaseSwaggerValidationResponse:
    properties:
      data:
        example: "null"
        x-nullable: true
      message:
        $ref: '#/definitions/response.MessageSwaggerValidationResponse'
    type: object
  response.DetailUserResponse:
    properties:
      avatar:
        example: 'avatar: coding'
        type: string
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      current_step:
        allOf:
        - $ref: '#/definitions/entity.CurrentStep'
        example: completed
      email:
        example: rizalarfiyan@plant-factory.com
        type: string
      id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      is_super_admin:
        example: false
        type: boolean
      last_logged_in_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      name:
        example: Rizal Arfiyan
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entity.UserStatus'
        example: active
      updated_at:
        example: "2024-01-01T00:00:00Z"
        type: string
    type: object
  response.HealthResponse:
    properties:
      environment:
        example: production
        type: string
      name:
        example: BE Plant Factory
        type: string
      status:
        example: ok
        type: string
      timestamp:
        example: "2026-01-01T00:00:00Z"
        type: string
    type: object
  response.ListUserResponse:
    properties:
      avatar:
        example: 'avatar: coding'
        type: string
      email:
        example: rizalarfiyan@plant-factory.com
        type: string
      id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      name:
        example: Rizal Arfiyan
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entity.UserStatus'
        example: active
    type: object
  response.MessageSwaggerResponse:
    properties:
      code:
        example: APP_CODE
        type: string
      params:
        additionalProperties:
          type: string
        example:
          key: value
        type: object
    type: object
  response.MessageSwaggerValidationResponse:
    properties:
      code:
        example: VALIDATION_ERROR
        type: string
      fields:
        additionalProperties:
          $ref: '#/definitions/response.ValidationErrorFieldSwaggerResponse'
        type: object
    type: object
  response.PaginationSwaggerResponse:
    properties:
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 100
        type: integer
      total_pages:
        example: 10
        type: integer
    type: object
  response.ValidationErrorFieldSwaggerResponse:
    properties:
      code:
        example: VALIDATION_CODE
        type: string
      params:
        additionalProperties:
          type: string
        example:
          key: value
        type: object
    type: object
info:
  contact: {}
  description: This is an API documentation of BE Plant Factory.
  title: BE Plant Factory API
  version: "1.0"
paths:
  /auth/google:
    get:
      consumes:
      - application/json
      description: Google Login of the application
      operationId: google-login
      parameters:
      - description: URL to redirect to after successful login (optional, overrides
          default success redirect URL)
        in: query
        name: redirect_url
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Google login URL retrieved successfully, Available code (SUCCESS)
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseSwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/response.AuthGoogleLoginResponse'
              type: object
        "400":
          description: Invalid redirect URL provided. Available code (INVALID_REDIRECT_URL)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Failed to retrieve Google login URL. Available code (INTERNAL_SERVER_ERROR)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      summary: Google Login
      tags:
      - Auth
  /auth/google/callback:
    get:
      consumes:
      - application/json
      description: Google Callback for the application
      operationId: google-callback
      parameters:
      - description: Authorization code from Google
        in: query
        name: code
        required: true
        type: string
      - description: State parameter for CSRF protection
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirects to the failure URL with error code as query parameter.
            Available code (INTERNAL_SERVER_ERROR, INVALID_STATE, PROVIDER_ERROR,
            TOKEN_EXCHANGE_FAILED, INVALID_CALLBACK, FAILED_CALLBACK)
          schema:
            type: string
      summary: Google Callback
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the currently authenticated user by invalidating their session
        and tokens
      operationId: logout
      produces:
      - application/json
      responses:
        "200":
          description: User logged out successfully. Available code (SUCCESS)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "401":
          description: Unauthorized - user is not authenticated. Available code (UNAUTHORIZED)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error. Available code (INTERNAL_SERVER_ERROR)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: Logout
      tags:
      - Auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Get the currently authenticated user's information
      operationId: get-current-user
      produces:
      - application/json
      responses:
        "200":
          description: Current user retrieved successfully. Available code (SUCCESS)
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseSwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/response.AuthMeResponse'
              type: object
        "401":
          description: Unauthorized - user is not authenticated. Available code (UNAUTHORIZED)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error. Available code (INTERNAL_SERVER_ERROR)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: Get Current User
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh the access token using a valid refresh token
      operationId: refresh-access-token
      produces:
      - application/json
      responses:
        "200":
          description: Access token refreshed successfully. Available code (SUCCESS)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "401":
          description: Unauthorized - invalid or expired refresh token. Available
            code (UNAUTHORIZED, INVALID_REFRESH_TOKEN, REFRESH_TOKEN_NOT_ELIGIBLE[remaining_seconds])
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error. Available code (INTERNAL_SERVER_ERROR)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieRefreshToken: []
      summary: Refresh Access Token
      tags:
      - Auth
  /health:
    get:
      consumes:
      - application/json
      description: Check Health of the application
      operationId: check-health
      produces:
      - application/json
      responses:
        "200":
          description: Health check successful. Available code (SUCCESS)
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseSwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/response.HealthResponse'
              type: object
      summary: Check Health
      tags:
      - Health
  /user:
    get:
      description: Get list of users with pagination and search
      operationId: user-list
      parameters:
      - description: Search by name (min 3 chars)
        in: query
        name: search
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - default: id
        description: Order by field
        enum:
        - id
        - created_at
        - name
        - email
        in: query
        name: order_by
        type: string
      - default: desc
        description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: sort_by
        type: string
      - description: Filter by status
        enum:
        - active
        - inactive
        - banned
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Users fetched successfully
          schema:
            allOf:
            - $ref: '#/definitions/response.BasePaginationSwaggerResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/response.ListUserResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.BaseSwaggerValidationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: List Users
      tags:
      - User
    post:
      consumes:
      - application/json
      description: Create a new user
      operationId: user-create
      parameters:
      - description: Create User Payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/request.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "400":
          description: Bad Request - invalid input data
          schema:
            $ref: '#/definitions/response.BaseSwaggerValidationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: Create User
      tags:
      - User
  /user/{id}:
    get:
      description: Get user detail by ID
      operationId: user-detail
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User detail fetched successfully
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseSwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/response.DetailUserResponse'
              type: object
        "400":
          description: Bad Request - invalid ID
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "422":
          description: User not found
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: Get User Detail
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Update user name and avatar
      operationId: user-update
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update User Payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/request.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User updated successfully
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "400":
          description: Bad Request - invalid input data
          schema:
            $ref: '#/definitions/response.BaseSwaggerValidationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: Update User
      tags:
      - User
  /user/{id}/status/{status}:
    post:
      description: Update user status (active, inactive, banned)
      operationId: user-update-status
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Status
        enum:
        - active
        - inactive
        - banned
        in: path
        name: status
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User status updated successfully
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "400":
          description: Bad Request - invalid status
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: Update User Status
      tags:
      - User
  /user/me/getting-started:
    post:
      consumes:
      - application/json
      description: |-
        Complete the getting started process for the user. Validation:
        name = REQUIRED, ALPHASPACE, MIN 3, MAX 64
        avatar = REQUIRED, STARTSWITH "avatar:"
      operationId: user-me-getting-started
      parameters:
      - description: Getting Started Payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/request.UserMeGettingStartedRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Getting started process completed successfully. Available code
            (SUCCESS)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "400":
          description: Bad Request - invalid input data. Available code (VALIDATION_ERROR,
            BAD_REQUEST)
          schema:
            $ref: '#/definitions/response.BaseSwaggerValidationResponse'
        "401":
          description: Unauthorized - user not authenticated. Available code (UNAUTHORIZED)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "422":
          description: Unprocessable Entity - validation failed. Available code (INVALID_CURRENT_STEP)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
        "500":
          description: Internal Server Error. Available code (INTERNAL_SERVER_ERROR)
          schema:
            $ref: '#/definitions/response.BaseSwaggerEmptyResponse'
      security:
      - CookieAccessToken: []
      summary: Getting Started
      tags:
      - UserMe
securityDefinitions:
  CookieAccessToken:
    in: cookie
    name: access_token
    type: apiKey
  CookieRefreshToken:
    in: cookie
    name: refresh_token
    type: apiKey
swagger: "2.0"
